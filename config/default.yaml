# 反检测浏览器框架配置（Camoufox 0.4.11 - Firefox引擎，C++级指纹保护）
browser:
  # headless模式:
  #   'virtual' - 推荐，内置Xvfb虚拟显示，启用GPU/WebGL渲染
  #   true      - 纯无头，WebGL不可用
  #   false     - 真实显示器模式（需DISPLAY环境变量）
  headless: "virtual"
  os: "windows"               # 伪装操作系统: windows / macos / linux
  locale: "zh-CN"
  geoip: true                 # 根据代理IP自动设置时区/语言（需camoufox[geoip]）
  viewport:
    width: 1920
    height: 1080

# 代理配置（留空则不使用代理）
proxy:
  enabled: false
  server: ""                  # e.g. "http://proxy:port" or "socks5://proxy:port"
  username: ""
  password: ""

# 行为模拟
behavior:
  mouse:
    enabled: true
    speed_min: 50             # 鼠标移动最小时间 ms
    speed_max: 200
    jitter: true              # 鼠标轨迹抖动
  typing:
    enabled: true
    delay_min: 50             # 打字最小间隔 ms
    delay_max: 150
    mistake_rate: 0.02        # 2% 概率打错字再修正
  scroll:
    enabled: true
    step_min: 100
    step_max: 300
    pause_min: 500
    pause_max: 2000
  random_delay:
    min: 800
    max: 3000

# WebRTC 防泄漏
webrtc:
  disable: true

# 日志
logging:
  level: "INFO"               # DEBUG / INFO / WARNING / ERROR
  file: "./logs/stealth.log"
